# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.rpi.yml — Raspberry Pi 5 with real Arduino
#
# Usage (from Project-NUEVO/ repository root):
#   docker compose -f ros2_ws/docker/docker-compose.rpi.yml up -d
#
# First startup builds the ROS workspace with colcon (~60s), then the
# container stays idle so ROS nodes can be started manually with
# `docker compose exec`.
# Subsequent restarts reuse the cached build artifacts (named volumes): ~5s.
#   - Python / .msg changes → docker compose restart  (no image rebuild)
#   - Pip dep changes        → docker compose build    (rebuilds image layer)
# ─────────────────────────────────────────────────────────────────────────────

services:
  ros2_runtime:
    build:
      context: ../..
      dockerfile: ros2_ws/docker/Dockerfile.robot

    image: nuevo-ros2:latest

    # ROS2 DDS (Fast-DDS / Cyclone) uses UDP multicast — requires host networking.
    network_mode: host

    # Arduino UART — RPi GPIO 14/15 (hardware UART).
    devices:
      - /dev/ttyAMA0:/dev/ttyAMA0

    volumes:
      # ROS workspace source — live from repo (edits take effect on restart).
      - ../../ros2_ws/src:/ros2_ws/src:ro
      # Shared Python bridge runtime used by the ROS wrapper package.
      - ../../nuevo_ui/backend:/workspace/nuevo_bridge_source:ro
      # Writable runtime data for auth/users and future bridge state.
      - ros2_runtime_data:/data
      # colcon build cache — only slow on first run. Wipe with: docker compose down -v
      - ros2_build:/ros2_ws/build
      - ros2_install:/ros2_ws/install

    environment:
      - NUEVO_BRIDGE_SOURCE=/workspace/nuevo_bridge_source
      - NUEVO_USERS_FILE=/data/users.json
      - NUEVO_SERIAL_PORT=/dev/ttyAMA0
      - NUEVO_SERIAL_BAUD=200000

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "test -f /ros2_ws/install/setup.bash"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 90s   # allow time for first-run colcon build

volumes:
  ros2_runtime_data:
  ros2_build:
  ros2_install:
